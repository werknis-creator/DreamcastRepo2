name: Build Dreamcast Game

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gcc g++ make wget git
        
    - name: Install Dreamcast toolchain
      run: |
        git clone https://github.com/KallistiOS/KallistiOS.git kos
        cd kos
        make
        cd ..
        export KOS_BASE=$PWD/kos
        export PATH=$PATH:$KOS_BASE/utils/bin
        echo "KOS_BASE=$KOS_BASE" >> $GITHUB_ENV
        echo "PATH=$PATH:$KOS_BASE/utils/bin" >> $GITHUB_ENV
        
    - name: Install mkdcdisc
      run: |
        git clone https://github.com/Cpasjuste/mkdcdisc.git
        cd mkdcdisc
        make
        sudo make install
        cd ..
        
    - name: Build game
      run: |
        export KOS_BASE=$GITHUB_WORKSPACE/kos
        export PATH=$PATH:$KOS_BASE/utils/bin
        source $KOS_BASE/environ.sh
        make
        
    - name: Create CDI
      run: |
        source $KOS_BASE/environ.sh
        $KOS_BASE/utils/bin/bin2boot game.elf -o game.bin
        mkdcdisc -o game.cdi -n "3D Game" game.bin
        
    - name: Upload CDI artifact
      uses: actions/upload-artifact@v3
      with:
        name: dreamcast-game
        path: game.cdi
        retention-days: 30
